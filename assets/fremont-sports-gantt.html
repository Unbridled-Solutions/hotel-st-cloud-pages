<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fremont Provisions - Sports Marketing Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #07080f;
            --card-color: #111827;
            --accent-blue: #5a8ba7; /* Unbridled blue */
            --accent-gold: #ba8032; /* Gold for highlights */
            --text-color: #e0e0e0;
            --secondary-text-color: #a0a0a0;

            /* Sport Colors */
            --nfl-color: #004C97;
            --pga-color: #006400;
            --nhl-color: #00205B;
            --nba-color: #C9082A;
            --mlb-color: #002D62;

            /* Priority Overlays */
            --critical-glow: 0 0 8px 4px var(--accent-gold), 0 0 20px 8px rgba(255, 215, 0, 0.4); /* Pulsing gold glow */
            --high-border: 2px solid var(--accent-gold);
            --medium-border: 1px solid var(--accent-blue);
            --low-border: 1px dashed var(--secondary-text-color);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--card-color);
            padding: 20px 30px;
            border-bottom: 2px solid var(--accent-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 2.5em;
            color: var(--text-color);
        }

        header h1 strong {
            color: var(--accent-gold);
        }

        header h2 {
            margin: 0;
            font-size: 1.2em;
            color: var(--secondary-text-color);
            font-weight: 400;
        }

        .container {
            display: flex;
            flex: 1; /* Take up remaining space */
            padding: 20px;
            gap: 20px;
            max-width: 1800px; /* Constrain width for large screens */
            margin: 0 auto;
        }

        .main-content {
            flex: 3; /* Gantt chart takes more space */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .right-sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 300px;
        }

        section {
            background-color: var(--card-color);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        h3 {
            color: var(--accent-blue);
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        h3 span {
            color: var(--text-color);
            font-weight: bold;
        }

        /* Filters */
        .filter-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
            font-size: 0.9em;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-group label {
            font-weight: bold;
            color: var(--accent-blue);
            white-space: nowrap;
        }
        .filter-controls button, .filter-controls select {
            background-color: var(--accent-blue);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
        }
        .filter-controls button:hover, .filter-controls select:hover {
            background-color: var(--accent-gold);
        }
        .filter-controls button.active {
            background-color: var(--accent-gold);
            color: var(--card-color);
            font-weight: bold;
        }
        .filter-controls select {
            background-color: var(--card-color);
            border: 1px solid var(--accent-blue);
        }

        /* Gantt Chart */
        .gantt-chart {
            overflow-x: auto;
            position: relative;
            padding-bottom: 15px; /* Space for scrollbar */
            background-color: var(--card-color);
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .gantt-timeline-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: var(--card-color);
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gantt-timeline-inner {
            min-width: 1800px; /* Base width for Gantt content */
            position: relative;
            height: 60px; /* Space for month/week markers */
            color: var(--secondary-text-color);
            font-size: 0.8em;
        }
        .month-marker {
            position: absolute;
            top: 0;
            height: 100%;
            border-left: 1px dashed rgba(255, 255, 255, 0.1);
            text-align: center;
            padding-top: 5px;
            box-sizing: border-box;
            color: var(--accent-blue);
            font-weight: bold;
        }
        .week-marker {
            position: absolute;
            top: 30px; /* Below month marker */
            height: calc(100% - 30px);
            border-left: 1px dotted rgba(255, 255, 255, 0.05);
            text-align: center;
            font-size: 0.7em;
            color: var(--secondary-text-color);
            width: 0; /* Just a line */
        }
        .month-marker span, .week-marker span {
            transform: rotate(-45deg);
            display: inline-block;
            transform-origin: 0 0;
            white-space: nowrap;
        }
        .gantt-content {
            min-width: 1800px; /* Match inner width of timeline header */
            position: relative;
            flex-grow: 1; /* Allow content to fill available vertical space */
            padding-top: 10px;
            box-sizing: border-box;
        }

        .gantt-sport-row {
            position: relative;
            height: 45px; /* Increased height for better visibility */
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-left: 120px; /* Space for sport label */
            box-sizing: border-box;
        }
        .gantt-sport-row.hidden {
            display: none;
        }
        .gantt-sport-row:last-child {
            border-bottom: none;
        }
        .gantt-sport-label {
            position: absolute;
            left: 0;
            width: 110px;
            text-align: right;
            padding-right: 10px;
            font-weight: bold;
            color: var(--accent-blue);
            z-index: 2; /* Keep label above bars */
        }

        .gantt-bars-container {
            position: relative; /* All bars are children of this */
            height: 100%; /* Fill the row height */
            width: 100%; /* Fill the row width */
        }

        .gantt-bar {
            position: absolute;
            height: 30px; /* Bar height */
            background-color: rgba(90, 139, 167, 0.7); /* Default color with transparency */
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            box-sizing: border-box;
            color: var(--text-color);
            font-size: 0.75em;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            z-index: 1;
            transition: all 0.2s ease;
            top: 50%;
            transform: translateY(-50%);
            cursor: help;
        }
        .gantt-bar:hover {
             transform: translateY(-50%) scale(1.02);
             box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
             z-index: 5;
        }

        /* Sport specific colors */
        .gantt-bar.NFL { background-color: var(--nfl-color); }
        .gantt-bar.PGA { background-color: var(--pga-color); }
        .gantt-bar.NHL { background-color: var(--nhl-color); }
        .gantt-bar.NBA { background-color: var(--nba-color); }
        .gantt-bar.MLB { background-color: var(--mlb-color); }

        /* Priority styles */
        .gantt-bar.Critical {
            border: var(--high-border);
            animation: pulse-glow 2s infinite alternate;
        }
        .gantt-bar.High {
            border: var(--high-border);
        }
        .gantt-bar.Medium {
            border: var(--medium-border);
        }
        .gantt-bar.Low {
            border: var(--low-border);
            opacity: 0.6;
        }

        @keyframes pulse-glow {
            from { box-shadow: var(--critical-glow); }
            to { box-shadow: var(--critical-glow), 0 0 15px 7px rgba(255, 215, 0, 0.6); }
        }

        .current-week-line {
            position: absolute;
            top: -10px; /* Extend above timeline header for prominence */
            bottom: -15px; /* Extend below gantt content for prominence */
            width: 2px;
            background-color: var(--accent-gold);
            z-index: 100;
            pointer-events: none; /* Make sure it doesn't block clicks */
            box-shadow: 0 0 5px var(--accent-gold);
        }

        /* Tooltip */
        .gantt-tooltip {
            position: absolute;
            background-color: var(--card-color);
            border: 1px solid var(--accent-gold);
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
            font-size: 0.85em;
            color: var(--text-color);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform: translate(-50%, -10px);
            white-space: normal;
            max-width: 300px; /* Limit tooltip width */
            text-align: left;
        }
        .gantt-tooltip.visible {
            opacity: 1;
            transform: translate(-50%, 0);
        }
        .gantt-tooltip h4 {
            margin: 0 0 5px 0;
            color: var(--accent-blue);
            font-size: 1.1em;
            border-bottom: 1px dotted rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }
        .gantt-tooltip p {
            margin: 5px 0;
        }
        .gantt-tooltip .priority {
            font-weight: bold;
        }
        .gantt-tooltip .priority.Critical { color: var(--accent-gold); }
        .gantt-tooltip .priority.High { color: orange; }
        .gantt-tooltip .priority.Medium { color: yellowgreen; }
        .gantt-tooltip .priority.Low { color: lightblue; }


        /* Upcoming Big Games */
        .upcoming-event {
            background-color: rgba(90, 139, 167, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .upcoming-event:last-child {
            margin-bottom: 0;
        }
        .upcoming-event h4 {
            margin-top: 0;
            margin-bottom: 5px;
            color: var(--accent-gold);
            font-size: 1.1em;
        }
        .upcoming-event p {
            margin: 5px 0;
            font-size: 0.9em;
        }
        .upcoming-event .details strong {
            color: var(--accent-blue);
        }
        .upcoming-event .days-until {
            font-weight: bold;
            color: orange;
        }
        .upcoming-event .promo-suggestion {
            font-style: italic;
            color: var(--secondary-text-color);
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
        }
        .run-google-ad-badge {
            display: inline-block;
            background-color: #4285F4; /* Google Blue */
            color: white;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.7em;
            font-weight: bold;
            margin-left: 10px;
            line-height: 1;
        }


        /* Promo Playbook */
        .tab-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-blue) var(--card-color);
        }
        .tab-controls button {
            background-color: var(--card-color);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            padding: 8px 15px;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            white-space: nowrap;
        }
        .tab-controls button:hover {
            background-color: rgba(90, 139, 167, 0.2);
        }
        .tab-controls button.active {
            background-color: var(--accent-blue);
            color: var(--text-color);
            border-color: var(--accent-blue);
            border-bottom-color: var(--card-color); /* Hide bottom border */
            position: relative;
            z-index: 2;
        }

        .promo-brief-content {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 0 8px 8px 8px;
            background-color: rgba(90, 139, 167, 0.05);
            min-height: 250px;
        }
        .promo-brief-card {
            display: none;
        }
        .promo-brief-card.active {
            display: block;
        }
        .promo-brief-card h4 {
            color: var(--accent-gold);
            font-size: 1.3em;
            margin-top: 0;
            margin-bottom: 15px;
        }
        .promo-brief-card h5 {
            color: var(--accent-blue);
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 1.1em;
            border-bottom: 1px dotted rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }
        .promo-brief-card ul {
            list-style: none;
            padding-left: 0;
        }
        .promo-brief-card ul li {
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }
        .promo-brief-card ul li:before {
            content: '•';
            color: var(--accent-gold);
            position: absolute;
            left: 0;
            font-size: 1.2em;
            line-height: 1;
        }
        .promo-brief-card p {
            margin-bottom: 10px;
        }
        .promo-brief-card .sport-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        .promo-brief-card .sport-tag {
            background-color: var(--accent-blue);
            color: var(--text-color);
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .promo-brief-card .sport-tag.NFL { background-color: var(--nfl-color); }
        .promo-brief-card .sport-tag.PGA { background-color: var(--pga-color); }
        .promo-brief-card .sport-tag.NHL { background-color: var(--nhl-color); }
        .promo-brief-card .sport-tag.NBA { background-color: var(--nba-color); }
        .promo-brief-card .sport-tag.MLB { background-color: var(--mlb-color); }


        /* Google Ads Intelligence */
        .google-ads-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        .google-ads-table th, .google-ads-table td {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            text-align: left;
        }
        .google-ads-table th {
            background-color: rgba(90, 139, 167, 0.2);
            font-weight: bold;
            color: var(--accent-blue);
            white-space: nowrap;
        }
        .google-ads-table tr:nth-child(even) {
            background-color: rgba(90, 139, 167, 0.05);
        }
        .google-ads-table .budget-signal {
            font-weight: bold;
            color: var(--accent-gold);
        }
        .google-ads-table .keywords {
            font-style: italic;
            color: var(--secondary-text-color);
        }

        /* Print Button */
        .print-export-button {
            background-color: var(--accent-gold);
            color: var(--card-color);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }
        .print-export-button:hover {
            background-color: #d19a4e;
        }
        @media print {
            body { background-color: white; color: black; }
            header, .main-content h3, .right-sidebar h3,
            .filter-controls, .tab-controls, .print-export-button {
                display: none;
            }
            .container { flex-direction: column; padding: 0; gap: 0; max-width: none; }
            .main-content, .right-sidebar, section { flex: none; width: 100%; margin: 0; padding: 10px; box-shadow: none; background-color: white; color: black; border: none; }
            h1, h2, h3 { color: black !important; }
            .gantt-chart, .gantt-content { overflow-x: visible; min-width: unset; width: 100%; }
            .gantt-timeline-inner, .gantt-sport-row { min-width: unset; width: 100%; }
            .gantt-timeline-header { border-bottom: 1px solid #ccc; background-color: white; }
            .month-marker, .week-marker { color: #555 !important; border-left-color: #eee !important; opacity: 0.7; }
            .gantt-sport-label { color: #333 !important; }
            .gantt-bar {
                background-color: lightgray !important;
                color: black !important;
                border: 1px solid #ccc !important;
                box-shadow: none !important;
                animation: none !important;
                opacity: 1 !important;
            }
            .gantt-bar.NFL { background-color: #C6DBED !important; }
            .gantt-bar.PGA { background-color: #D6EADF !important; }
            .gantt-bar.NHL { background-color: #CCD9E5 !important; }
            .gantt-bar.NBA { background-color: #F7D4DA !important; }
            .gantt-bar.MLB { background-color: #C0DEEB !important; }

            .current-week-line { display: none; } /* Hide print line */
            .gantt-tooltip { display: none !important; } /* Hide tooltips in print */

            .upcoming-event, .promo-brief-card, .google-ads-table {
                background-color: #f9f9f9;
                border: 1px solid #eee;
                color: black;
            }
            .upcoming-event h4, .promo-brief-card h4, h5 { color: #333 !important; }
            .upcoming-event .promo-suggestion, .google-ads-table .keywords, .promo-brief-card ul li:before { color: #666 !important; }
            .promo-brief-card .sport-tag { color: white !important; } /* Keep white text on background */
        }


        /* Responsive adjustments */
        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
                gap: 20px;
            }
            .right-sidebar {
                flex: none; /* Remove flex sizing when stacked */
                min-width: unset;
                width: 100%;
            }
            .gantt-chart {
                /* min-height will adjust based on content */
            }
        }
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                padding: 15px;
            }
            header h1 {
                font-size: 2em;
            }
            header h2 {
                font-size: 1em;
            }
            .filter-controls {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .filter-group {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            .tab-controls {
                flex-wrap: nowrap;
            }
            .tab-controls button {
                padding: 6px 10px;
            }
            section {
                padding: 15px;
            }
            h3 {
                font-size: 1.3em;
            }
            .gantt-sport-label {
                width: 90px;
                font-size: 0.8em;
            }
            .gantt-sport-row {
                padding-left: 100px;
            }
            .gantt-bar {
                font-size: 0.7em;
                height: 25px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1><strong>FREMONT PROVISIONS</strong></h1>
            <h2>Sports Marketing Command Center</h2>
        </div>
        <button class="print-export-button" onclick="window.print()">Print / Export</button>
    </header>

    <div class="container">
        <div class="main-content">
            <section id="gantt-section">
                <h3>GANTT CHART</h3>
                <div class="filter-controls">
                    <div class="filter-group">
                        <label>Filter Sports:</label>
                        <button data-sport="all" class="active">All</button>
                        <button data-sport="NFL">NFL</button>
                        <button data-sport="PGA">PGA</button>
                        <button data-sport="NHL">NHL</button>
                        <button data-sport="NBA">NBA</button>
                        <button data-sport="MLB">MLB</button>
                    </div>
                    <div class="filter-group">
                        <label>Filter Priority:</label>
                        <button data-priority="all" class="active">All</button>
                        <button data-priority="critical-high">Critical + High</button>
                        <button data-priority="critical">Critical Only</button>
                    </div>
                </div>

                <div class="gantt-chart">
                    <div class="gantt-timeline-header">
                        <div class="gantt-timeline-inner" id="gantt-timeline-header">
                            <!-- Month and Week Markers will be generated here -->
                        </div>
                    </div>
                    <div class="gantt-content" id="gantt-content">
                        <!-- Gantt Rows and Bars will be generated here -->
                        <div class="current-week-line"></div>
                        <div class="gantt-tooltip"></div>
                    </div>
                </div>
            </section>

            <section id="promo-playbook-section">
                <h3>PROMO PLAYBOOK</h3>
                <div class="tab-controls" id="promo-month-tabs">
                    <!-- Month tabs generated here -->
                </div>
                <div class="promo-brief-content" id="promo-brief-content">
                    <!-- Promo briefs for each month generated here -->
                </div>
            </section>
        </div>

        <div class="right-sidebar">
            <section id="upcoming-games-section">
                <h3>UPCOMING BIG GAMES</h3>
                <div id="upcoming-events-list">
                    <!-- Upcoming events generated here -->
                </div>
            </section>

            <section id="google-ads-section">
                <h3>GOOGLE ADS INTELLIGENCE</h3>
                <table class="google-ads-table">
                    <thead>
                        <tr>
                            <th>Month</th>
                            <th>Active Sports</th>
                            <th>Recommendation</th>
                            <th>Keywords</th>
                            <th>Budget Signal</th>
                        </tr>
                    </thead>
                    <tbody id="google-ads-table-body">
                        <!-- Google Ads data generated here -->
                    </tbody>
                </table>
            </section>
        </div>
    </div>

    <script>
        const eventsData = [
            { Sport: 'NFL', Event: 'Preseason', Start: '2026-08-13', End: '2026-08-29', Priority: 'Medium' },
            { Sport: 'PGA', Event: 'FedEx St. Jude Championship', Start: '2026-08-13', End: '2026-08-16', Priority: 'High' },
            { Sport: 'PGA', Event: 'BMW Championship', Start: '2026-08-20', End: '2026-08-23', Priority: 'High' },
            { Sport: 'PGA', Event: 'Tour Championship', Start: '2026-08-27', End: '2026-08-30', Priority: 'Critical' },

                const monthEndOffsetDays = (monthEndAbsolute - ganttStartDate) / (1000 * 60 * 60 * 24);
                const monthWidthDays = monthEndOffsetDays - monthStartOffsetDays;


                const monthLeft = (monthStartOffsetDays / totalGanttDays) * 100;
                const monthWidth = (monthWidthDays / totalGanttDays) * 100;

                const monthDiv = document.createElement('div');
                monthDiv.className = 'month-marker';

        function getActiveSportsForMonth(monthDate) {
            const startOfMonth = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
            const endOfMonth = new Date(monthDate.getFullYear(), monthDate.getMonth() + 1, 0, 23, 59, 59);

            const activeSports = new Set();
            eventsData.forEach(event => {
                const eventStart = parseDate(event.Start);
                const eventEnd = parseDate(event.End);
                if ((eventStart <= endOfMonth && eventEnd >= startOfMonth) || (eventStart >= startOfMonth && eventStart <= endOfMonth)) {
                    activeSports.add(event.Sport);
                }
            });
            return Array.from(activeSports).sort();
        }

        function createPromoMonthBriefs() {
            promoMonthTabs.innerHTML = '';
            promoBriefContent.innerHTML = '';

            GanttMonths.forEach((monthDate, index) => {
                const monthName = monthDate.toLocaleString('en-US', { month: 'long', year: 'numeric' });
                const monthNameShort = monthDate.toLocaleString('en-US', { month: 'short' });
                const monthYearKey = `${monthNameShort} ${monthDate.getFullYear()}`;

                // Create Tab button
                const tabButton = document.createElement('button');
                tabButton.textContent = monthName;
                tabButton.dataset.month = monthYearKey;
                tabButton.addEventListener('click', () => {
                    document.querySelectorAll('.tab-controls button').forEach(btn => btn.classList.remove('active'));
                    tabButton.classList.add('active');
                    document.querySelectorAll('.promo-brief-card').forEach(card => card.classList.remove('active'));
                    document.getElementById(`brief-${monthYearKey.replace(/\s/g, '-')}`).classList.add('active');
                });
                promoMonthTabs.appendChild(tabButton);

                // Create Brief content
                const briefCard = document.createElement('div');
                briefCard.id = `brief-${monthYearKey.replace(/\s/g, '-')}`;
                briefCard.className = 'promo-brief-card';

                const activeSportsInMonth = getActiveSportsForMonth(monthDate);
                let promosHtml = '';
                let fbHtml = '';
                let googleAdsHtml = '';

                activeSportsInMonth.forEach(sport => {
                    const sportPromos = promoLibrary[sport] || [];
                    if (sportPromos.length > 0) {
                        promosHtml += `<h5>${sport} Promotions:</h5><ul>`;
                        sportPromos.slice(0, 2).forEach(promo => { // Take first 2 promos
                            promosHtml += `<li>${promo}</li>`;
                        });
                        promosHtml += `</ul>`;
                    }
                    // Simple F&B idea based on sport
                    if (sport === 'NFL') fbHtml += `<li>Game Day Platter: Wings, Nachos, Sliders combo.</li>`;
                    else if (sport === 'PGA') fbHtml += `<li>"19th Hole" Cocktail specials, light bites.</li>`;
                    else if (sport === 'NHL') fbHtml += `<li>Poutine special, Craft beer bucket deals.</li>`;
                    else if (sport === 'NBA') fbHtml += `<li>Basketball themed cocktails, Giant pretzel with cheese.</li>`;
                    else if (sport === 'MLB') fbHtml += `<li>All-American Hot Dogs & Burgers, local craft brews.</li>`;
                });

                 // Google Ads recommendation for the month
                const monthNameFull = monthDate.toLocaleString('en-US', { month: 'long' });
                const adsRec = googleAdsSuggestions.find(rec => rec.Month === monthNameFull);
                if (adsRec) {
                    googleAdsHtml = `
                        <h5>Google Ads Recommendation:</h5>
                        <p><strong>Push:</strong> ${adsRec.Recommendation}</p>
                        <p><strong>Keywords:</strong> <em>${adsRec.Keywords}</em></p>
                        <p><strong>Budget Signal:</strong> <span class="budget-signal">${adsRec.Budget}</span></p>
                    `;
                } else {
                    googleAdsHtml = `<h5>Google Ads Recommendation:</h5><p>No specific recommendation for this month. Maintain base campaigns.</p>`;
                }


                briefCard.innerHTML = `
                    <h4>${monthName} Marketing Brief</h4>
                    <h5>Active Sports:</h5>
                    <div class="sport-list">
                        ${activeSportsInMonth.map(s => `<span class="sport-tag ${s}">${s}</span>`).join('')}
                    </div>
                    ${promosHtml}
                    <h5>F&B Specials Ideas:</h5>
                    <ul>${fbHtml || "<li>Get creative with seasonal ingredients and game-day favorites!</li>"}</ul>
                    ${googleAdsHtml}
                `;
                promoBriefContent.appendChild(briefCard);

                // Set first month as active
                if (index === 0) {
                    tabButton.classList.add('active');
                    briefCard.classList.add('active');
                }
            });
        }


        // Google Ads Intelligence Table
        function renderGoogleAdsTable() {
            googleAdsTableBody.innerHTML = '';
            googleAdsSuggestions.forEach(rec => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${rec.Month}</td>
                    <td>${rec.Sports.map(s => `<span class="sport-tag ${s}">${s}</span>`).join(', ')}</td>
                    <td>${rec.Recommendation}</td>
                    <td class="keywords">${rec.Keywords}</td>
                    <td class="budget-signal">${rec.Budget}</td>
                `;
                googleAdsTableBody.appendChild(row);
            });
        }


        // Initial Render
        document.addEventListener('DOMContentLoaded', () => {
            renderGanttChart();
            renderUpcomingEvents();
            createPromoMonthBriefs();
            renderGoogleAdsTable();

            // Scroll Gantt to current week line for better UX
            const ganttScrollContainer = document.querySelector('.gantt-chart');
            const currentWeekLine = ganttContent.querySelector('.current-week-line');
            if (ganttScrollContainer && currentWeekLine) {
                 // Calculate scroll position to center the line
                const lineLeft = currentWeekLine.offsetLeft;
                const containerWidth = ganttScrollContainer.offsetWidth;
                const scrollLeft = lineLeft - (containerWidth / 2);
                ganttScrollContainer.scrollLeft = Math.max(0, scrollLeft);
            }
        });

    </script>
</body>
</html>
