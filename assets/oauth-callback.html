<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Connecting to Cloudbeds...</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0ede6; }
    .box { background: white; padding: 40px; border-radius: 8px; text-align: center; max-width: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h2 { color: #1a2535; }
    p { color: #4b4f54; }
    code { background: #f0ede6; padding: 8px 16px; border-radius: 4px; font-size: 14px; word-break: break-all; display: block; margin: 16px 0; }
  </style>
</head>
<body>
  <div class="box">
    <h2>✅ Cloudbeds Authorization</h2>
    <p>Authorization code received. Copy the code below and send it to MC on Telegram.</p>
    <code id="code"></code>
    <p style="font-size:13px;color:#888;">You can close this tab after copying the code.</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      document.getElementById('code').textContent = code;
    } else {
      document.getElementById('code').textContent = 'No code found. Please try again.';
    }
  </script>
</body>
</html>
