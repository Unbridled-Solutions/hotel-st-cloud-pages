<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Daily To-Do — Unbridled</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e1117; color: #e8e8e8; font-family: 'Segoe UI', system-ui, sans-serif; padding: 24px; max-width: 900px; margin: 0 auto; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; padding-bottom: 18px; border-bottom: 1px solid #1e2a38; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 20px; font-weight: 700; color: #fff; }
  .header p { font-size: 12px; color: #7a8fa6; margin-top: 3px; }
  .updated { font-size: 11px; color: #3a5a76; text-align: right; }

  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  .sum-box { background: #131c27; border: 1px solid #1e2a38; border-radius: 10px; padding: 14px 16px; text-align: center; }
  .sum-box .num { font-size: 26px; font-weight: 800; color: #fff; }
  .sum-box .lbl { font-size: 10px; color: #5a7a96; text-transform: uppercase; letter-spacing: 0.8px; margin-top: 4px; }
  .sum-box.done .num { color: #4ade80; }
  .sum-box.active .num { color: #60a5fa; }
  .sum-box.blocked .num { color: #f87171; }
  .sum-box.pending .num { color: #f59e0b; }

  .category { margin-bottom: 28px; }
  .cat-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .cat-icon { font-size: 18px; }
  .cat-title { font-size: 14px; font-weight: 700; color: #fff; }
  .cat-count { font-size: 11px; color: #5a7a96; background: #1e2a38; padding: 2px 8px; border-radius: 10px; }

  .todo-item {
    display: flex; align-items: flex-start; gap: 12px;
    background: #131c27; border: 1px solid #1e2a38;
    border-radius: 10px; padding: 14px 16px;
    margin-bottom: 8px; transition: background 0.15s;
    cursor: pointer;
  }
  .todo-item:hover { background: #1a2535; }
  .todo-item.completed { opacity: 0.5; }
  .todo-item.completed .todo-text { text-decoration: line-through; color: #5a7a96; }

  .status-dot {
    width: 14px; height: 14px; border-radius: 50%;
    flex-shrink: 0; margin-top: 2px;
    border: 2px solid;
  }
  .status-dot.completed { background: #4ade80; border-color: #4ade80; }
  .status-dot.in_progress { background: #60a5fa; border-color: #60a5fa; animation: pulse 2s infinite; }
  .status-dot.pending { background: transparent; border-color: #f59e0b; }
  .status-dot.blocked { background: #f87171; border-color: #f87171; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .todo-body { flex: 1; }
  .todo-text { font-size: 13px; color: #e8e8e8; line-height: 1.5; margin-bottom: 5px; }
  .todo-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .badge { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 600; }
  .badge.high { background: #3a1a1a; color: #f87171; }
  .badge.medium { background: #3a2a1a; color: #f59e0b; }
  .badge.low { background: #1e2a38; color: #7a8fa6; }
  .badge.owner { background: #1a2a3a; color: #60a5fa; font-weight: 400; }
  .badge.status-completed { background: #1a3a2a; color: #4ade80; }
  .badge.status-in_progress { background: #1a2a3a; color: #60a5fa; }
  .badge.status-pending { background: #2a2a1a; color: #f59e0b; }
  .badge.status-blocked { background: #3a1a1a; color: #f87171; }

  .footer { text-align: center; color: #3a5a76; font-size: 11px; padding-top: 20px; border-top: 1px solid #1e2a38; margin-top: 10px; }
  .footer strong { color: #5a8ba7; }

  .progress-bar { height: 4px; background: #1e2a38; border-radius: 2px; margin-bottom: 28px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #5a8ba7, #4ade80); border-radius: 2px; transition: width 0.5s; }

  .legend { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #7a8fa6; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📋 MC Daily To-Do</h1>
    <p>Unbridled Ecosystem — Live task tracker</p>
  </div>
  <div class="updated" id="updated">Loading...</div>
</div>

<div class="summary" id="summary"></div>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div> Completed</div>
  <div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div> In Progress</div>
  <div class="legend-item"><div class="legend-dot" style="background:transparent;border:2px solid #f59e0b"></div> Pending</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div> Blocked</div>
</div>

<div id="categories"></div>

<div class="footer">
  Maintained by <strong>MC — Unbridled Solutions</strong> · Updated daily at 6am MT · Last updated: <span id="footer-updated">—</span>
</div>

<script>
async function loadTodos() {
  const res = await fetch('todos.json?v=' + Date.now());
  const data = await res.json();

  document.getElementById('updated').innerHTML = `Last updated<br>${data.updated}`;
  document.getElementById('footer-updated').textContent = data.updated;

  // Count stats
  let total = 0, done = 0, active = 0, blocked = 0, pending = 0;
  data.categories.forEach(cat => {
    cat.items.forEach(item => {
      total++;
      if (item.status === 'completed') done++;
      else if (item.status === 'in_progress') active++;
      else if (item.status === 'blocked') blocked++;
      else pending++;
    });
  });

  // Summary
  document.getElementById('summary').innerHTML = `
    <div class="sum-box done"><div class="num">${done}</div><div class="lbl">Done</div></div>
    <div class="sum-box active"><div class="num">${active}</div><div class="lbl">In Progress</div></div>
    <div class="sum-box pending"><div class="num">${pending}</div><div class="lbl">Pending</div></div>
    <div class="sum-box blocked"><div class="num">${blocked}</div><div class="lbl">Blocked</div></div>
  `;

  // Progress bar
  document.getElementById('progress').style.width = Math.round((done / total) * 100) + '%';

  // Categories
  const container = document.getElementById('categories');
  data.categories.forEach(cat => {
    const catEl = document.createElement('div');
    catEl.className = 'category';

    const catDone = cat.items.filter(i => i.status === 'completed').length;

    catEl.innerHTML = `
      <div class="cat-header">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-title" style="color:${cat.color}">${cat.name}</span>
        <span class="cat-count">${catDone}/${cat.items.length} done</span>
      </div>
      ${cat.items.map(item => `
        <div class="todo-item ${item.status === 'completed' ? 'completed' : ''}">
          <div class="status-dot ${item.status}"></div>
          <div class="todo-body">
            <div class="todo-text">${item.text}</div>
            <div class="todo-meta">
              <span class="badge ${item.priority}">${item.priority} priority</span>
              <span class="badge status-${item.status}">${item.status.replace('_', ' ')}</span>
              <span class="badge owner">→ ${item.owner}</span>
            </div>
          </div>
        </div>
      `).join('')}
    `;
    container.appendChild(catEl);
  });
}

loadTodos();
</script>
</body>
</html>
