<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Period 7 Forecast…</title>
<style>
  body { background: #0f1923; color: #e8e0d4; font-family: -apple-system, sans-serif;
         display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .card { background: #162433; border: 1px solid #263d52; border-radius: 12px;
          padding: 36px 44px; max-width: 480px; text-align: center; }
  .eyebrow { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #c9aa7c; margin-bottom: 8px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .sub { color: #8a9aaa; font-size: 14px; margin-bottom: 24px; }
  .weeks { text-align: left; margin-bottom: 28px; }
  .wk { display: flex; justify-content: space-between; padding: 10px 14px; border-radius: 6px;
        border: 1px solid #263d52; margin-bottom: 8px; font-size: 13px; }
  .wk-label { color: #c9aa7c; font-weight: 600; }
  .wk-total { color: #4caf7d; font-weight: 700; }
  .btn { background: #c9aa7c; color: #1a2e3b; border: none; border-radius: 8px;
         font-size: 15px; font-weight: 700; padding: 14px 32px; cursor: pointer; width: 100%; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.9; }
  .status { margin-top: 14px; font-size: 12px; color: #8a9aaa; min-height: 18px; }
  .banner { display: none; background: rgba(76,175,125,0.12); border: 1px solid rgba(76,175,125,0.4);
            color: #4caf7d; border-radius: 8px; padding: 12px 16px; font-size: 13px;
            font-weight: 600; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">FPH · 1887 · War Room</div>
  <h1>Period 7 Forecast Revenue</h1>
  <p class="sub">4 weeks · $125,000 total budget</p>

  <div class="weeks">
    <div class="wk">
      <span class="wk-label">Wk 1 — Jun 15–21</span>
      <span class="wk-total">$31,000</span>
    </div>
    <div class="wk">
      <span class="wk-label">Wk 2 — Jun 22–28</span>
      <span class="wk-total">$31,000</span>
    </div>
    <div class="wk">
      <span class="wk-label">Wk 3 — Jun 29–Jul 5</span>
      <span class="wk-total">$31,000</span>
    </div>
    <div class="wk">
      <span class="wk-label">Wk 4 — Jul 6–12</span>
      <span class="wk-total">$32,000</span>
    </div>
  </div>

  <button class="btn" onclick="seed()">Lock In Period 7 &amp; Open Planner →</button>
  <div class="status" id="status">Click to inject all 4 weeks into the labor planner.</div>
  <div class="banner" id="banner">✓ Period 7 locked in. Opening planner now…</div>
</div>

<script>
// Period 7 forecast revenue — Hotel St. Cloud F&B (FPH · 1887 · War Room)
// Each array = Mon–Sun (indices 0–6)
const WEEKS = [
  { key: 'fp-ph-wk-2026-06-15', week: '2026-06-15', revs: [3000, 3000, 3500, 3500, 7000, 7000, 4000] },
  { key: 'fp-ph-wk-2026-06-22', week: '2026-06-22', revs: [3000, 3000, 3500, 3500, 7000, 7000, 4000] },
  { key: 'fp-ph-wk-2026-06-29', week: '2026-06-29', revs: [3000, 3000, 3500, 3500, 7000, 7000, 4000] },
  { key: 'fp-ph-wk-2026-07-06', week: '2026-07-06', revs: [3000, 3000, 3500, 3500, 7000, 8000, 4000] },
];

function seed() {
  document.getElementById('status').textContent = 'Writing forecast data…';

  WEEKS.forEach(w => {
    const existing = localStorage.getItem(w.key);
    let data = existing ? JSON.parse(existing) : {};

    data.week  = w.week;
    data.revs  = w.revs.map(String);
    if (!data.pcts) data.pcts = ['28','28','28','30','32','35','30'];

    localStorage.setItem(w.key, JSON.stringify(data));

    const idx = JSON.parse(localStorage.getItem('fp-ph-week-index') || '[]');
    if (!idx.includes(w.key)) { idx.unshift(w.key); localStorage.setItem('fp-ph-week-index', JSON.stringify(idx.slice(0, 52))); }
  });

  document.getElementById('status').textContent = '';
  document.getElementById('banner').style.display = 'block';

  setTimeout(() => {
    window.location.href = 'fp-ph-planner.html?week=2026-06-15';
  }, 1200);
}
</script>
</body>
</html>
