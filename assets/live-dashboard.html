<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="900">
<title>Unbridled — All Campaigns Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
<style>
:root{--bg:#0f1923;--navy:#1a2e3b;--card:#162433;--border:#263d52;--gold:#c9aa7c;--blue:#5a8ba7;--text:#e8e0d4;--muted:#8a9aaa;--green:#4caf7d;--red:#e05a5a;--orange:#f97316;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;}
header{background:linear-gradient(135deg,var(--navy),var(--bg));border-bottom:2px solid var(--gold);padding:24px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.hdr-eyebrow{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
header h1{font-size:1.5rem;font-weight:700;color:#fff;}
header h1 span{color:var(--gold);}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.badge{font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:20px;}
.badge.live{background:rgba(76,175,125,.15);color:var(--green);border:1px solid var(--green);}
.badge.paused{background:rgba(224,90,90,.12);color:var(--red);border:1px solid var(--red);}
.badge.pending{background:rgba(201,170,124,.12);color:var(--gold);border:1px solid var(--gold);}
.updated{font-size:.75rem;color:var(--muted);}
main{max-width:1100px;margin:0 auto;padding:28px 20px;}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px;}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.metric-card:nth-child(1){border-top:3px solid var(--gold);}
.metric-card:nth-child(2){border-top:3px solid var(--blue);}
.metric-card:nth-child(3){border-top:3px solid var(--green);}
.metric-card:nth-child(4){border-top:3px solid var(--orange);}
.metric-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;}
.metric-value{font-size:1.7rem;font-weight:700;color:var(--gold);line-height:1.1;}
.metric-sub{font-size:.75rem;color:var(--muted);margin-top:3px;}
.section-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin:28px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.camp-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:14px;}
.camp-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap;}
.camp-name{font-size:1rem;font-weight:700;color:var(--text);}
.camp-sub{font-size:.75rem;color:var(--muted);margin-top:2px;}
.camp-metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:12px;}
.camp-stat{text-align:center;}
.stat-val{display:block;font-size:1.1rem;font-weight:700;color:var(--text);}
.stat-lbl{display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:2px;}
.camp-bar-wrap{background:var(--border);border-radius:4px;height:4px;}
.camp-bar{height:4px;border-radius:4px;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:14px;}
.chart-title{font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:16px;text-transform:uppercase;letter-spacing:.06em;}
.chart-wrap{position:relative;height:220px;}
.mc-take{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:10px;padding:18px 20px;margin-bottom:14px;}
.mc-take-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.mc-avatar{width:30px;height:30px;border-radius:50%;background:var(--gold);color:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;}
.mc-take-title{font-size:.8rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;}
.obs-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:.85rem;}
.obs-row:last-child{border-bottom:none;padding-bottom:0;}
.obs-icon{flex-shrink:0;width:22px;}
footer{text-align:center;padding:24px;font-size:.75rem;color:var(--muted);border-top:1px solid var(--border);margin-top:20px;}
footer span{color:var(--gold);}
@media(max-width:600px){.camp-metrics{grid-template-columns:repeat(3,1fr);} .summary-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>

const opts = {
  responsive:true, maintainAspectRatio:false,
  plugins:{
    legend:{labels:{color:'#8a9aaa',font:{size:11}}},
    tooltip:{backgroundColor:'#162433',titleColor:'#c9aa7c',bodyColor:'#e8e0d4',borderColor:'#263d52',borderWidth:1}
  },
  scales:{
    x:{ticks:{color:'#8a9aaa',font:{size:10}},grid:{color:'#1e2e3e'}},
    y:{ticks:{color:'#8a9aaa',font:{size:10}},grid:{color:'#1e2e3e'}}
  }
};
new Chart(document.getElementById('clicksChart'),{
  type:'line',
  data:{
    labels:dates,
    datasets:Object.entries(data).filter(([k,v])=>v.clicks.some(x=>x>0)).map(([label,d])=>({
      label,data:d.clicks,borderColor:d.color,backgroundColor:d.color+'22',tension:0.3,fill:true,pointRadius:3
    }))
  },
  options:opts
});
new Chart(document.getElementById('spendChart'),{
  type:'bar',
  data:{
    labels:dates,
    datasets:Object.entries(data).filter(([k,v])=>v.spend.some(x=>x>0)).map(([label,d])=>({
      label,data:d.spend,backgroundColor:d.color+'bb',borderColor:d.color,borderWidth:1
    }))
  },
  options:{...opts,scales:{...opts.scales,x:{...opts.scales.x,stacked:true},y:{...opts.scales.y,stacked:true}}}
});
<\/script>
