<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive | Unbridled · Stan Bullis</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1923;--navy:#1a2e3b;--card:#162433;--border:#1e3347;
  --gold:#c9aa7c;--gold-light:#e0c99a;--blue:#5a8ba7;--green:#4caf7d;
  --red:#e05a5a;--amber:#e0a040;--text:#e8e0d4;--muted:#6a8a9a;--white:#f5f5f5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Josefin Sans',sans-serif;font-weight:300;min-height:100vh;padding-bottom:5rem}

.topbar{background:#0a1219;border-bottom:1px solid var(--border);padding:.75rem clamp(1rem,4vw,2rem);display:flex;align-items:center;justify-content:space-between}
.topbar-brand{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--white)}
.topbar-brand span{color:var(--gold)}
.topbar-back{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s;display:flex;align-items:center;gap:.4rem}
.topbar-back:hover{color:var(--gold)}

.hero{background:linear-gradient(180deg,#0a1219 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:2.5rem clamp(1rem,4vw,2rem) 2rem;position:relative}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.hero-eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem}
.hero-title{font-size:clamp(24px,4vw,40px);font-weight:700;color:var(--white);letter-spacing:-.5px;line-height:1.1;margin-bottom:.5rem}
.hero-title em{color:var(--gold);font-style:normal}
.hero-sub{font-size:13px;color:var(--muted);line-height:1.6;max-width:560px}

.wrap{max-width:900px;margin:0 auto;padding:0 clamp(1rem,4vw,1.5rem)}

/* Search + stats bar */
.control-bar{display:flex;align-items:center;gap:.75rem;margin:1.5rem 0 1rem;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.5rem .9rem;color:var(--text);font-size:12px;font-family:'Josefin Sans',sans-serif;outline:none;transition:border-color .2s;letter-spacing:.5px}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:var(--muted)}
.stat-pill{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);background:rgba(106,138,154,.1);border:1px solid var(--border);border-radius:10px;padding:.25rem .65rem;white-space:nowrap}
.stat-pill span{color:var(--gold);font-weight:700}

.section{margin:2rem 0}
.section-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--border)}
.section-icon{font-size:16px}
.section-title{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);font-weight:700}
.section-count{font-size:10px;letter-spacing:1px;color:var(--muted);margin-left:auto}

.arch-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem;margin-bottom:.6rem;display:flex;align-items:flex-start;gap:1rem;transition:border-color .2s;opacity:.85}
.arch-item:hover{border-color:var(--blue);opacity:1}
.arch-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:.45rem}
.arch-body{flex:1;min-width:0}
.arch-label{font-size:14px;font-weight:600;color:var(--white);margin-bottom:.2rem;line-height:1.3}
.arch-meta{display:flex;align-items:center;flex-wrap:wrap;gap:.5rem;margin-top:.3rem}
.arch-date{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.arch-source{font-size:10px;letter-spacing:1px;color:var(--blue);text-transform:uppercase}
.arch-actions{display:flex;gap:.4rem;align-items:center;flex-shrink:0}
.btn-restore{background:none;border:1px solid var(--border);cursor:pointer;padding:.2rem .65rem;border-radius:20px;color:var(--muted);font-size:10px;letter-spacing:1px;text-transform:uppercase;font-family:'Josefin Sans',sans-serif;transition:all .2s;white-space:nowrap}
.btn-restore:hover{border-color:var(--blue);color:var(--blue)}
.btn-perm-delete{background:none;border:none;cursor:pointer;padding:.25rem .3rem;border-radius:6px;color:var(--muted);font-size:13px;line-height:1;transition:all .2s;opacity:.35}
.btn-perm-delete:hover{color:var(--red);opacity:1}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:13px;line-height:1.8}
.empty-state .big{font-size:32px;margin-bottom:.75rem;opacity:.4}

.no-match{text-align:center;padding:2rem;color:var(--muted);font-size:12px;letter-spacing:1px;text-transform:uppercase}

/* Snackbar */
#restoreBar{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1e3347;border:1px solid var(--gold);border-radius:8px;padding:.6rem 1.2rem;font-size:12px;color:var(--text);display:none;align-items:center;gap:.75rem;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.5)}
#restoreBar button{background:none;border:none;color:var(--gold);cursor:pointer;font-size:12px;font-family:'Josefin Sans',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase}

.updated-note{text-align:center;margin-top:2.5rem;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.updated-note span{color:var(--gold)}
</style>
</head>
<body>
<!-- FLOATING BACK BUTTON -->
<a href="javascript:history.back()" title="Go back" style="position:fixed;bottom:1.25rem;left:1.25rem;z-index:9999;background:#1f2b3f;color:#ba8032;border:1px solid #ba8032;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:20px;box-shadow:0 2px 12px rgba(0,0,0,.35);opacity:.92;transition:opacity .2s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.92">←</a>



<div class="topbar">
  <span class="topbar-brand">MC · <span>Unbridled</span></span>
  <a class="topbar-back" href="master-deliverables.html">← Back to Master Deliverables</a>
</div>

<div class="hero">
  <div class="wrap">
    <div class="hero-eyebrow">Running Log</div>
    <h1 class="hero-title">🗄 <em>Archive</em></h1>
    <p class="hero-sub">Every completed and removed item — segmented by category, timestamped, and searchable. Nothing gets lost.</p>
  </div>
</div>

<div class="wrap">
  <div class="control-bar">
    <input class="search-input" id="searchInput" type="text" placeholder="Search archive…" oninput="renderArchive()" />
    <div class="stat-pill">Total: <span id="statTotal">0</span></div>
    <div class="stat-pill">Categories: <span id="statCats">0</span></div>
    <button class="btn-restore" onclick="clearAll()" style="border-color:var(--red);color:var(--red);opacity:.6" title="Clear entire archive — cannot undo">🗑 Clear all</button>
  </div>

  <div id="archiveContent"></div>

  <p class="updated-note">Maintained by <span>MC — Unbridled Solutions</span></p>
</div>

<!-- Snackbar -->
<div id="restoreBar">
  <span id="restoreMsg">Item restored</span>
  <button onclick="undoRestore()">Undo</button>
</div>

<script>
// ── Storage keys (must match master-deliverables.html) ─────────────────────
const DELETED_KEY   = 'mc_deleted_items';   // [{id, label, category?, date?}]
const QUICK_KEY     = 'mc_quick_archived';  // quick-add items archived from todos page

// ── Category map: item DOM id prefix → {icon, title, color} ──────────────
// These match the section IDs on master-deliverables.html
const CATEGORY_MAP = {
  'item-ads':          { icon: '📣', title: 'Google Ads',           color: 'var(--amber)' },
  'item-hsc':          { icon: '🏨', title: 'Hotel St. Cloud',       color: 'var(--gold)'  },
  'item-web':          { icon: '🌐', title: 'Web & Pages',           color: 'var(--blue)'  },
  'item-book':         { icon: '📖', title: 'The Unbridled Way',     color: 'var(--gold)'  },
  'item-events':       { icon: '🎪', title: 'Live Events OS',        color: 'var(--amber)' },
  'item-ops':          { icon: '⚙️',  title: 'Operations',           color: 'var(--muted)' },
  'item-legal':        { icon: '⚖️',  title: 'Legal',                color: 'var(--red)'   },
  'item-todo':         { icon: '📋', title: 'To-Do & Tasks',         color: 'var(--blue)'  },
  'item-calls':        { icon: '📞', title: 'Calls',                 color: 'var(--green)' },
  'item-harrison':     { icon: '🏗',  title: 'Harrison Building',    color: 'var(--amber)' },
  'item-makers':       { icon: '🔧', title: 'Fremont Makers',        color: 'var(--blue)'  },
  'item-beunbridled':  { icon: '🤖', title: 'BeUnbridled',           color: 'var(--gold)'  },
  'call-':             { icon: '📞', title: 'Calls',                 color: 'var(--green)' },
  'quick-':            { icon: '✏️',  title: 'Quick To-Dos',         color: 'var(--muted)' },
};

function getCategoryFor(id) {
  for (const [prefix, cat] of Object.entries(CATEGORY_MAP)) {
    if (id.startsWith(prefix)) return { key: prefix, ...cat };
  }
  return { icon: '📁', title: 'Other', color: 'var(--muted)', key: 'other' };
}

function getArchive() {
  try { return JSON.parse(localStorage.getItem(DELETED_KEY) || '[]'); } catch { return []; }
}
function saveArchive(arr) {
  localStorage.setItem(DELETED_KEY, JSON.stringify(arr));
}

let lastRestored = null;

function renderArchive() {
  const query  = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
  const all    = getArchive();
  const filtered = query ? all.filter(a => a.label?.toLowerCase().includes(query)) : all;

  document.getElementById('statTotal').textContent = all.length;

  // Group by category
  const groups = {};
  filtered.forEach(a => {
    const cat = getCategoryFor(a.id || '');
    const key = cat.title;
    if (!groups[key]) groups[key] = { cat, items: [] };
    groups[key].items.push(a);
  });

  const catKeys = Object.keys(groups);
  document.getElementById('statCats').textContent = catKeys.length;

  const content = document.getElementById('archiveContent');

  if (all.length === 0) {
    content.innerHTML = `
      <div class="empty-state">
        <div class="big">🗄</div>
        Nothing archived yet.<br>
        Tap 🗑 on any item in Master Deliverables to log it here.
      </div>`;
    return;
  }

  if (filtered.length === 0) {
    content.innerHTML = `<div class="no-match">No results for "${query}"</div>`;
    return;
  }

  content.innerHTML = catKeys.map(key => {
    const { cat, items } = groups[key];
    const rows = items.map(a => {
      const dateStr = a.date
        ? new Date(a.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        : '';
      const source = a.source || 'Master Deliverables';
      return `
        <div class="arch-item" id="arch-${a.id}">
          <div class="arch-dot"></div>
          <div class="arch-body">
            <div class="arch-label">${a.label || a.id}</div>
            <div class="arch-meta">
              ${dateStr ? `<span class="arch-date">📅 ${dateStr}</span>` : ''}
              <span class="arch-source">${source}</span>
            </div>
          </div>
          <div class="arch-actions">
            <button class="btn-restore" onclick="restoreItem('${a.id}')">↩ Restore</button>
            <button class="btn-perm-delete" onclick="permDelete('${a.id}')" title="Permanently delete">✕</button>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="section">
        <div class="section-header">
          <span class="section-icon">${cat.icon}</span>
          <span class="section-title" style="color:${cat.color}">${cat.title}</span>
          <span class="section-count">${items.length} item${items.length !== 1 ? 's' : ''}</span>
        </div>
        ${rows}
      </div>`;
  }).join('');
}

function restoreItem(id) {
  const archive = getArchive();
  const item = archive.find(a => a.id === id);
  if (!item) return;
  lastRestored = item;
  saveArchive(archive.filter(a => a.id !== id));
  renderArchive();
  showSnack(`"${(item.label||'').substring(0,38)}" restored to Master Deliverables`);
}

function undoRestore() {
  if (!lastRestored) return;
  const archive = getArchive();
  archive.push(lastRestored);
  saveArchive(archive);
  lastRestored = null;
  hideSnack();
  renderArchive();
}

function permDelete(id) {
  if (!confirm('Permanently delete this item? This cannot be undone.')) return;
  saveArchive(getArchive().filter(a => a.id !== id));
  renderArchive();
}

function clearAll() {
  if (!confirm('Clear the entire archive? This cannot be undone.')) return;
  saveArchive([]);
  renderArchive();
}

let snackTimer;
function showSnack(msg) {
  const bar = document.getElementById('restoreBar');
  document.getElementById('restoreMsg').textContent = msg;
  bar.style.display = 'flex';
  clearTimeout(snackTimer);
  snackTimer = setTimeout(hideSnack, 5000);
}
function hideSnack() {
  document.getElementById('restoreBar').style.display = 'none';
}

// ── Enrich archive items with dates on first load ──────────────────────────
// Items saved before this update won't have dates — we add today as fallback
(function enrichDates() {
  const archive = getArchive();
  let changed = false;
  archive.forEach(a => {
    if (!a.date) { a.date = new Date().toISOString(); changed = true; }
    if (!a.source) { a.source = 'Master Deliverables'; changed = true; }
  });
  if (changed) saveArchive(archive);
})();

renderArchive();
</script>
</body>
</html>
